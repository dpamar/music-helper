<!DOCTYPE html>
<html>
<head><title>Test MIDI</title></head>
<body>
<h2>MIDI Module Tests</h2>
<div id="results"></div>

<script src="midi.js"></script>
<script>
const results = document.getElementById('results');

function assert(condition, message) {
    const p = document.createElement('p');
    if (condition) {
        p.style.color = 'green';
        p.textContent = 'PASS: ' + message;
    } else {
        p.style.color = 'red';
        p.textContent = 'FAIL: ' + message;
    }
    results.appendChild(p);
    return condition;
}

// Test 1: La classe existe
assert(typeof MidiPlayer !== 'undefined', 'MidiPlayer class exists');

if (typeof MidiPlayer !== 'undefined') {
    const player = new MidiPlayer();
    assert(player !== null, 'MidiPlayer can be instantiated');
    assert(typeof player.play === 'function', 'play() method exists');
    assert(typeof player.stop === 'function', 'stop() method exists');
    assert(typeof player.initAudioContext === 'function', 'initAudioContext() method exists');
    assert(typeof player.noteToFrequency === 'function', 'noteToFrequency() method exists');
    assert(typeof player.generateMidiEvents === 'function', 'generateMidiEvents() method exists');
    assert(typeof player.playNote === 'function', 'playNote() method exists');
    assert(player.isPlaying === false, 'isPlaying initially false');

    // Test 2: Frequency conversion
    const freqTests = [
        {note: 'A', alt: '', oct: 0, expected: 440},
        {note: 'C', alt: '', oct: 0, expected: 261.63},
        {note: 'C', alt: 'sharp', oct: 0, expected: 277.18},
        {note: 'C', alt: '', oct: 1, expected: 523.25},
        {note: 'C', alt: '', oct: -1, expected: 130.81},
        {note: 'C', alt: 'flat', oct: 0, expected: 246.94},
        {note: 'B', alt: '', oct: 0, expected: 493.88}
    ];

    let allFreqPass = true;
    for (const t of freqTests) {
        const freq = player.noteToFrequency(t.note, t.alt, t.oct);
        if (Math.abs(freq - t.expected) > 0.1) {
            assert(false, `noteToFrequency(${t.note}, ${t.alt}, ${t.oct}) = ${freq.toFixed(2)}, expected ${t.expected}`);
            allFreqPass = false;
        }
    }
    if (allFreqPass) {
        assert(true, 'All frequency conversions correct');
    }

    // Test 3: MIDI events generation
    const testScore = {
        title: 'Test',
        tempo: 120,
        timeSignature: {numerator: 4, denominator: 4},
        clef: 'sol',
        keySignature: [],
        notes: [
            {type: 'note', note: 'C', alteration: '', octave: 0, duration: 1},
            {type: 'note', note: 'D', alteration: '', octave: 0, duration: 1},
            {type: 'rest', duration: 1},
            {type: 'chord', notes: [
                {note: 'C', alteration: '', octave: 0},
                {note: 'E', alteration: '', octave: 0},
                {note: 'G', alteration: '', octave: 0}
            ], duration: 2}
        ]
    };

    const events = player.generateMidiEvents(testScore);
    // 120 BPM = 0.5s per quarter note
    assert(events.length === 3, `generateMidiEvents returns 3 events (notes+chord, not rests), got ${events.length}`);
    assert(Math.abs(events[0].time - 0) < 0.001, `Event 0 at time 0, got ${events[0].time}`);
    assert(Math.abs(events[1].time - 0.5) < 0.001, `Event 1 at time 0.5, got ${events[1].time}`);
    assert(Math.abs(events[2].time - 1.5) < 0.001, `Event 2 at time 1.5 (after rest), got ${events[2].time}`);
    assert(events[2].notes.length === 3, `Chord event has 3 notes, got ${events[2].notes.length}`);
    assert(Math.abs(events[2].duration - 1.0) < 0.001, `Chord duration is 1.0s (blanche at 120bpm), got ${events[2].duration}`);
}
</script>
</body>
</html>
